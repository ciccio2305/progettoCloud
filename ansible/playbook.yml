---
 
- hosts: EC2_server
  become: true
  tasks:

    - name: Copy Kubernetes Manifests from GitHub
      copy:
        src: ../kubernetes/
        dest: /home/{{ ansible_user_id }}/kubernetes/
        mode: "777"

    - name: Copy sutupDocker.sh from GitHub
      copy:
        src: ../sutupDocker.sh
        dest: /home/{{ ansible_user_id }}/
        mode: "777"

    - name: Run sutupDocker.sh
      become: true
      shell: "cd /home/{{ ansible_user_id }} && sudo ./sutupDocker.sh"

    - name: Check if Docker socket exists
      stat:
        path: /var/run/docker.sock
      register: docker_sock

    - name: Fix docker socket permissions
      become: true
      shell: "sudo chmod 666 /var/run/docker.sock"
      when: docker_sock.stat.exists | default(false)

    
