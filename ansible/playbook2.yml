---

- hosts: EC2_server
  become: true
  tasks:

    - name: "[LOG] VM / OS info (Ubuntu vs Debian, versione, PATH)"
      become: false
      shell: |
        echo "=== OS ==="
        cat /etc/os-release 2>/dev/null || true
        echo "=== Kernel ==="
        uname -a
        echo "=== User / Home / PATH ==="
        echo "USER=$USER ID={{ ansible_user_id }} HOME=$HOME"
        echo "PATH=$PATH"
        echo "=== Docker (se presente) ==="
        which docker 2>/dev/null || echo "docker: not in PATH"
        docker --version 2>/dev/null || true
        ls -la /var/run/docker.sock 2>/dev/null || echo "docker.sock: not found"
        echo "=== systemd docker service ==="
        systemctl status docker 2>/dev/null || true
      register: log_os
      changed_when: false

    - name: "[LOG] Mostra info OS/VM"
      debug:
        msg: "{{ log_os.stdout_lines }}"

    - name: Check if Docker is installed
      become: true
      command: which docker
      register: docker_check
      changed_when: false
      failed_when: false

    - name: "[LOG] Esito check Docker (rc={{ docker_check.rc }})"
      debug:
        msg: "Docker in PATH: {{ docker_check.rc == 0 }} | which output: {{ docker_check.stdout | default('') }}"

    - name: Install Docker (repo Debian/Ubuntu in base a OS, get.docker.com sbaglia su Debian GCE)
      become: true
      shell: |
        set -e
        . /etc/os-release
        if [ "$ID" = "debian" ]; then
          DOCKER_DISTRO=debian
          echo "=== Rilevato Debian: uso repo Docker per Debian ($VERSION_CODENAME) ==="
        else
          DOCKER_DISTRO=ubuntu
          echo "=== Rilevato Ubuntu: uso repo Docker per Ubuntu ($VERSION_CODENAME) ==="
        fi
        apt-get update -qq
        apt-get install -y ca-certificates curl
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL "https://download.docker.com/linux/${DOCKER_DISTRO}/gpg" -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/${DOCKER_DISTRO} ${VERSION_CODENAME} stable" > /etc/apt/sources.list.d/docker.list
        apt-get update -qq
        apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
        systemctl start docker
        systemctl enable docker
        usermod -aG docker {{ ansible_user_id }}
        echo "=== Docker installato ==="
        docker --version
      when: docker_check.rc != 0
      register: docker_install
      args:
        executable: /bin/bash

    - name: "[LOG] Output installazione Docker"
      debug:
        msg: "{{ docker_install.stdout_lines | default([]) }}"
      when: docker_install.stdout_lines is defined and (docker_install.stdout_lines | length) > 0

    - name: Ensure Docker service is started (if present)
      become: true
      shell: "systemctl start docker 2>/dev/null || true"
      changed_when: false
      failed_when: false

    - name: Delete Minikube
      become: false
      shell: "minikube delete --all"
      ignore_errors: true
      register: minikube_delete
      changed_when: false

    - name: "[LOG] Minikube delete (ignore_errors)"
      debug:
        msg: "{{ minikube_delete.stdout_lines | default([]) }}"
      when: minikube_delete.stdout_lines is defined

    - name: Start Minikube with Docker driver
      become: false
      shell: "sg docker -c 'minikube start --driver=docker' 2>&1"
      environment:
        PATH: "/usr/local/bin:/usr/bin:/bin"
      register: minikube_start
      failed_when: false

    - name: "[LOG] Output Minikube start (rc={{ minikube_start.rc }})"
      debug:
        msg: "{{ (minikube_start.stdout_lines or []) + (minikube_start.stderr_lines or []) }}"

    - name: Fail se Minikube non è partito
      fail:
        msg: "Minikube start fallito (rc={{ minikube_start.rc }}). Controlla il log sopra; su Debian a volte serve installare docker prima (playbook1) o usare una VM Ubuntu."
      when: minikube_start.rc != 0

    - name: Apply Kubernetes Manifests for metrics-server
      become: false
      shell: " kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml"

    - name: Apply patch for kube 
      become: false
      shell: "kubectl patch deployment metrics-server -n kube-system --type='json' -p='[{\"op\": \"add\", \"path\": \"/spec/template/spec/containers/0/args/-\", \"value\": \"--kubelet-insecure-tls\"}, {\"op\": \"add\", \"path\": \"/spec/template/spec/containers/0/args/-\", \"value\": \"--kubelet-preferred-address-types=InternalIP,Hostname,ExternalIP\"}]'"


    - name: Apply Kubernetes Manifests for mongo
      become: false
      shell: "kubectl apply -f /home/{{ ansible_user_id }}/kubernetes/mongo.yml"

    - name: Wait for mongo pod to be running
      become: false
      shell: |
        until kubectl get pods -l app=mongo | grep -m 1 '1/1'; do
          sleep 1
        done

    - name: Apply Kubernetes Manifests
      become: false
      shell: "kubectl apply -f /home/{{ ansible_user_id }}/kubernetes/"


    


