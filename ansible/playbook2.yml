---

- hosts: EC2_server
  become: true
  tasks:

    - name: Check if Docker is installed
      become: true
      command: which docker
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Install Docker (official script) when not present
      become: true
      shell: |
        curl -fsSL https://get.docker.com | sh
        systemctl start docker
        systemctl enable docker
        usermod -aG docker {{ ansible_user_id }}
      when: docker_check.rc != 0

    - name: Ensure Docker service is started (if present)
      become: true
      shell: "systemctl start docker 2>/dev/null || true"
      changed_when: false
      failed_when: false

    - name: Delete Minikube
      become: false
      shell: "minikube delete --all"
      ignore_errors: true

    - name: Start Minikube with Docker driver
      become: false
      shell: "sg docker -c 'minikube start --driver=docker'"
      environment:
        PATH: "/usr/local/bin:/usr/bin:/bin"

    - name: Apply Kubernetes Manifests for metrics-server
      become: false
      shell: " kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml"

    - name: Apply patch for kube 
      become: false
      shell: "kubectl patch deployment metrics-server -n kube-system --type='json' -p='[{\"op\": \"add\", \"path\": \"/spec/template/spec/containers/0/args/-\", \"value\": \"--kubelet-insecure-tls\"}, {\"op\": \"add\", \"path\": \"/spec/template/spec/containers/0/args/-\", \"value\": \"--kubelet-preferred-address-types=InternalIP,Hostname,ExternalIP\"}]'"


    - name: Apply Kubernetes Manifests for mongo
      become: false
      shell: "kubectl apply -f /home/{{ ansible_user_id }}/kubernetes/mongo.yml"

    - name: Wait for mongo pod to be running
      become: false
      shell: |
        until kubectl get pods -l app=mongo | grep -m 1 '1/1'; do
          sleep 1
        done

    - name: Apply Kubernetes Manifests
      become: false
      shell: "kubectl apply -f /home/{{ ansible_user_id }}/kubernetes/"


    


